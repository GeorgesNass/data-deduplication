version: "3.9" ## Docker Compose file format version

services:
  dedup_api: ## Main Data Deduplication API service (Flask now, FastAPI-ready)
    container_name: data-deduplication-api ## Container name
    image: data-deduplication:latest ## Docker image name

    build:
      context: .. ## Build context set to project root
      dockerfile: docker/Dockerfile ## Dockerfile location

    env_file:
      - ../.env ## Load environment variables

    environment:
      PYTHONPATH: /app ## Ensure src imports work

    volumes:
      - ..:/app ## Mount full project for data, logs and configs

    working_dir: /app ## Set working directory inside container

    ports:
      - "8080:8080" ## Expose API port

    tty: true ## Enable TTY for readable logs
    stdin_open: true ## Allow interactive usage if needed


  dedup_menu: ## Interactive CLI menu (menu_pipeline.sh)
    container_name: data-deduplication-menu ## Container name
    image: data-deduplication:latest ## Reuse same image

    build:
      context: .. ## Build context set to project root
      dockerfile: docker/Dockerfile ## Dockerfile location

    env_file:
      - ../.env ## Load environment variables

    environment:
      PYTHONPATH: /app ## Ensure src imports work

    volumes:
      - ..:/app ## Mount full project for data, logs and configs

    working_dir: /app ## Set working directory inside container

    command: > ## Run interactive pipeline menu
      bash /app/menu_pipeline.sh

    tty: true ## Enable TTY for interactive menu
    stdin_open: true ## Allow interactive usage
