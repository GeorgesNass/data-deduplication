[pytest]
minversion = 7.0

## Where tests are located
testpaths =
    tests

## Test file naming convention
python_files =
    test_*.py

## Optional naming conventions
python_classes =
    Test*

python_functions =
    test_*

## Add project root to PYTHONPATH
pythonpath =
    .

## Pytest options
addopts =
    -ra
    --strict-markers
    --disable-warnings

## Warning filtering
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

## Custom markers
markers =
    slow: marks large dataset deduplication tests
    integration: marks full pipeline deduplication tests
    unit: marks fast isolated unit tests
    smoke: marks quick validation tests

## Directories to ignore during test discovery
norecursedirs =
    .git
    .github
    .venv
    venv
    env
    __pycache__
    build
    dist
    artifacts
    outputs
    logs
    models
    data
    notebooks
    docker